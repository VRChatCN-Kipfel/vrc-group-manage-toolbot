name: Test & Lint

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vrc-group-manage-toolbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint deps
        run: pip install ".[lint]"
      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: vrc-group-manage-toolbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install ".[test]"
      - name: Run tests with coverage
        run: pytest -v --cov=services --cov=plugins --cov=utils --cov-report=term-missing tests/
