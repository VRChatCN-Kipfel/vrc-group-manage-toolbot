name: Test

on:
  push:
    branches: [main, master, "feat-*", "fix-*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.14"]
    defaults:
      run:
        working-directory: ./vrc-group-manage-toolbot
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "nonebot2[aiohttp,fastapi,httpx,websockets]>=2.4.4" "nonebot-adapter-onebot>=2.4.6" "nonebot-plugin-localstore>=0.7.4" "nonebug>=0.4.0" "pytest>=7.0,<9.0" "pytest-asyncio<1.0" "pytest-cov>=4.0" "pytest-mock>=3.10" httpx
      - name: Run tests
        run: pytest --cov=services --cov=utils --cov=plugins --cov-report=term-missing
