name: Test

on:
  push:
    branches: [main, master, "feat-*", "fix-*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.14"]
    defaults:
      run:
        working-directory: ./vrc-group-manage-toolbot
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Set up test environment
        run: cp .env.test .env
      - name: Run tests
        run: pytest --cov=services --cov=utils --cov=plugins --cov-fail-under=40 --cov-report=term-missing -o asyncio_mode=auto
